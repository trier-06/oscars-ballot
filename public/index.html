<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#OscarsSoWhite — 2026 Oscars Ballot</title>
<meta name="description" content="Cast your 98th Oscars ballot. Celebrate historic nominations. Created by April Reign, creator of #OscarsSoWhite.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:creator" content="@ReignOfApril">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-l:#E8C96A;--black:#0A0A0A;--charcoal:#1A1A1A;
  --ink:#2C2C2C;--warm:#FEFCF7;--parch:#F2EAD8;--cream:#FAF6EE;
  --correct:#2D7A4F;--wrong:#8B2020;--cbg:#EAF5EE;--wbg:#F9EAEA;
  --osw:#7B3FA0;--oswl:#C084FC;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);font-family:'Cormorant Garamond',Georgia,serif;color:var(--ink);min-height:100vh;}
.page{background:var(--warm);max-width:980px;margin:0 auto;box-shadow:0 0 0 1px var(--gold),0 0 0 4px var(--black),0 0 0 5px var(--gold);}

/* HEADER */
.hdr{background:var(--black);padding:28px 40px 22px;text-align:center;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.18) 0%,transparent 70%);pointer-events:none;}
.rule{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:8px 0;}
.yr{font-family:'Cinzel',serif;color:var(--gold);font-size:10px;letter-spacing:6px;opacity:.8;}
.ttl{font-family:'Cinzel',serif;color:var(--gold-l);font-size:clamp(22px,5vw,44px);font-weight:700;letter-spacing:2px;text-shadow:0 0 30px rgba(201,168,76,.3);margin:5px 0 3px;}
.sub{font-family:'Cormorant Garamond',serif;color:rgba(201,168,76,.6);font-size:14px;font-style:italic;letter-spacing:2px;}

/* OSW STRIP */
.osw-strip{background:#1a0f2e;border-top:1px solid rgba(192,132,252,.4);border-bottom:1px solid rgba(192,132,252,.4);padding:10px 40px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.osw-lbl{font-family:'Cinzel',serif;color:var(--oswl);font-size:9px;letter-spacing:3px;white-space:nowrap;}
.osw-div{width:1px;height:20px;background:rgba(192,132,252,.3);flex-shrink:0;}
.osw-desc{font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.55);font-size:13px;font-style:italic;flex:1;}
.osw-cr{margin-left:auto;font-family:'Cormorant Garamond',serif;color:rgba(192,132,252,.4);font-size:12px;font-style:italic;white-space:nowrap;}

/* ENTRY */
.entry-page{background:var(--black);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.entry-card{background:var(--warm);max-width:460px;width:100%;box-shadow:0 0 0 1px var(--gold),0 0 0 4px var(--black),0 0 0 5px var(--gold),0 8px 60px rgba(0,0,0,.7);}
.entry-body{padding:26px 36px 34px;}
.f-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:5px;text-transform:uppercase;}
.f-inp{width:100%;border:none;border-bottom:1px solid var(--gold);background:transparent;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--ink);padding:5px 0;outline:none;font-style:italic;margin-bottom:20px;}
.f-inp::placeholder{color:rgba(0,0,0,.25);font-style:italic;}
.platform-row{display:flex;gap:8px;margin-bottom:20px;}
.f-sel{border:none;border-bottom:1px solid var(--gold);background:transparent;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;color:var(--gold);padding:5px 0;outline:none;cursor:pointer;flex:0 0 auto;}
.f-inp-handle{flex:1;border:none;border-bottom:1px solid var(--gold);background:transparent;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--ink);padding:5px 0;outline:none;font-style:italic;}
.f-inp-handle::placeholder{color:rgba(0,0,0,.25);font-style:italic;}
.err{background:#fdf0f0;border:1px solid var(--wrong);color:var(--wrong);padding:8px 12px;font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;margin-bottom:14px;border-radius:2px;}
.btn-gold{width:100%;background:var(--gold);color:var(--black);border:none;padding:13px 0;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;cursor:pointer;font-weight:700;transition:background .2s;}
.btn-gold:hover{background:var(--gold-l);}
.ballot-ct{text-align:center;margin-top:12px;font-family:'Cormorant Garamond',serif;font-size:13px;color:#999;font-style:italic;}
.cd-bar{background:var(--charcoal);padding:7px 36px;text-align:center;}
.cd-lbl{font-family:'Cinzel',serif;color:var(--gold);font-size:9px;letter-spacing:2px;}
.cd-num{font-family:'Cinzel',serif;color:var(--gold-l);font-size:14px;font-weight:700;}
.locked-bar{background:#1a0505;padding:7px 36px;text-align:center;border-bottom:1px solid rgba(255,80,80,.2);}
.locked-lbl{font-family:'Cinzel',serif;color:#ff7070;font-size:9px;letter-spacing:2px;}

/* LANDING SECTION */
.landing{background:var(--black);padding:32px 40px;border-bottom:1px solid rgba(201,168,76,.2);}
.landing-tag{font-family:'Cinzel',serif;color:var(--oswl);font-size:9px;letter-spacing:4px;opacity:.7;margin-bottom:12px;}
.landing-h{font-family:'Cinzel',serif;color:var(--gold-l);font-size:clamp(16px,3vw,24px);font-weight:700;letter-spacing:1px;margin-bottom:12px;}
.landing-p{font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.7);font-size:15px;line-height:1.7;margin-bottom:16px;}
.landing-p b{color:var(--gold-l);font-weight:600;font-style:normal;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:20px 0;}
.stat-card{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);padding:14px 16px;}
.stat-num{font-family:'Cinzel',serif;color:var(--gold-l);font-size:22px;font-weight:700;line-height:1;}
.stat-lbl{font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.55);font-size:13px;font-style:italic;margin-top:4px;line-height:1.4;}
.landing-cta{font-family:'Cormorant Garamond',serif;color:rgba(201,168,76,.7);font-size:15px;font-style:italic;text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid rgba(201,168,76,.15);}

/* TABS */
.tabs{background:var(--charcoal);display:flex;}
.tab{flex:1;padding:11px 0;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-align:center;cursor:pointer;color:rgba(201,168,76,.4);border:none;border-bottom:2px solid transparent;background:transparent;text-transform:uppercase;transition:all .2s;}
.tab.active{color:var(--gold-l);border-bottom:2px solid var(--gold);}

/* PROGRESS */
.prog-bar{background:var(--charcoal);padding:8px 40px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}
.prog-lbl{font-family:'Cinzel',serif;color:var(--gold);font-size:9px;letter-spacing:2px;white-space:nowrap;}
.prog-track{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-l));transition:width .4s ease;}
.prog-num{font-family:'Cinzel',serif;color:var(--gold-l);font-size:11px;white-space:nowrap;}
.prog-num b{font-size:17px;}
.prog-cd{font-family:'Cinzel',serif;color:rgba(201,168,76,.4);font-size:8px;letter-spacing:1px;white-space:nowrap;border-left:1px solid rgba(201,168,76,.2);padding-left:10px;}

/* FETCH BAR */
.fetch-bar{background:#140505;padding:8px 40px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(255,80,80,.15);}
.fetch-msg{font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.5);font-size:13px;font-style:italic;}
.btn-fetch{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;background:var(--gold);color:var(--black);border:none;padding:8px 14px;cursor:pointer;font-weight:700;}
.btn-fetch:disabled{opacity:.5;cursor:not-allowed;}

/* BALLOT */
.ballot-body{background:var(--warm);padding:20px 28px 36px;}
.success-box{background:#f0faf4;border:1px solid var(--correct);color:var(--correct);padding:10px 14px;font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;margin-bottom:18px;border-radius:2px;text-align:center;}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.4),transparent);margin:3px 0;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);}

/* BEST PICTURE */
.bp-section{padding:14px 12px;border-bottom:1px solid rgba(201,168,76,.18);}
.bp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.bp-card{border:1.5px solid rgba(201,168,76,.3);padding:10px 8px;cursor:pointer;text-align:center;border-radius:2px;background:var(--cream);transition:all .2s;position:relative;}
.bp-card.rep{border-color:rgba(192,132,252,.5);background:rgba(123,63,160,.04);}
.bp-card.selected{border-color:var(--gold);background:rgba(201,168,76,.14);}
.bp-card.rep.selected{border-color:var(--osw);background:rgba(123,63,160,.13);}
.bp-card.correct{border-color:var(--correct)!important;background:var(--cbg)!important;}
.bp-card.wrong{border-color:var(--wrong)!important;background:var(--wbg)!important;opacity:.7;}
.bp-card.winner{border-color:var(--gold)!important;background:rgba(201,168,76,.12)!important;}
.bp-radio{width:10px;height:10px;border:1.5px solid var(--gold);border-radius:50%;margin:0 auto 5px;background:white;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.bp-card.rep .bp-radio{border-color:var(--oswl);}
.bp-card.selected .bp-radio,.bp-card.correct .bp-radio,.bp-card.wrong .bp-radio{background:var(--gold);}
.bp-card.rep.selected .bp-radio{background:var(--osw);border-color:var(--osw);}
.bp-card.correct .bp-radio{background:var(--correct)!important;border-color:var(--correct)!important;}
.bp-card.wrong .bp-radio{background:var(--wrong)!important;border-color:var(--wrong)!important;}
.bp-dot{width:4px;height:4px;background:white;border-radius:50%;display:none;}
.bp-card.selected .bp-dot,.bp-card.correct .bp-dot,.bp-card.wrong .bp-dot{display:block;}
.bp-title{font-family:'Cormorant Garamond',serif;font-size:12px;line-height:1.3;font-style:italic;color:var(--ink);}
.bp-rep-dot{width:6px;height:6px;background:var(--oswl);border-radius:50%;margin:4px auto 0;box-shadow:0 0 5px rgba(192,132,252,.6);cursor:pointer;position:relative;}

/* CATEGORY BLOCKS */
.cat-block{padding:13px 16px;border-right:1px solid rgba(201,168,76,.18);border-bottom:1px solid rgba(201,168,76,.18);}
.cat-block.no-right{border-right:none;}
.cat-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid rgba(201,168,76,.2);display:flex;align-items:center;gap:8px;}
.cat-title::before{content:'';width:12px;height:1px;background:var(--gold);flex-shrink:0;}
.cat-title.done::after{content:'✓';margin-left:auto;color:var(--gold);font-size:10px;}

/* NOMINEES */
.nom-list{list-style:none;}
.nom-item{display:flex;align-items:flex-start;gap:8px;padding:4px 6px;margin:0 -6px;cursor:pointer;border-radius:3px;transition:background .15s;border-left:2px solid transparent;}
.nom-item.rep{border-left:2px solid rgba(192,132,252,.55);padding-left:8px;margin-left:-8px;}
.nom-item.selected{background:rgba(201,168,76,.1);}
.nom-item.rep.selected{background:rgba(123,63,160,.09);}
.nom-item.correct{background:var(--cbg)!important;}
.nom-item.wrong{background:rgba(139,32,32,.07)!important;opacity:.8;}
.nom-item.winner{background:rgba(201,168,76,.09)!important;}
.radio{width:13px;height:13px;border:1.5px solid var(--gold);border-radius:50%;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;background:white;transition:all .2s;}
.nom-item.rep .radio{border-color:var(--oswl);}
.nom-item.selected .radio{background:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.18);}
.nom-item.rep.selected .radio{background:var(--osw);border-color:var(--osw);}
.nom-item.correct .radio{background:var(--correct)!important;border-color:var(--correct)!important;}
.nom-item.wrong .radio{background:var(--wrong)!important;border-color:var(--wrong)!important;}
.rdot{width:4px;height:4px;background:white;border-radius:50%;display:none;}
.nom-item.selected .rdot,.nom-item.correct .rdot,.nom-item.wrong .rdot{display:block;}
.nom-name{font-family:'Cormorant Garamond',serif;font-size:13px;line-height:1.35;color:var(--ink);flex:1;}
.nom-film{font-style:italic;color:#777;}
.rep-badge{font-size:9px;background:rgba(123,63,160,.1);color:var(--osw);border:1px solid rgba(123,63,160,.25);border-radius:2px;padding:1px 5px;font-family:'Cinzel',serif;cursor:pointer;user-select:none;flex-shrink:0;align-self:center;position:relative;}
.result-icon{font-size:12px;flex-shrink:0;align-self:center;min-width:14px;text-align:center;}
.tooltip{display:none;position:absolute;bottom:calc(100% + 7px);right:0;background:#1a0f2e;color:rgba(255,255,255,.85);font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;padding:8px 12px;border:1px solid rgba(192,132,252,.35);border-radius:3px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.7);width:240px;line-height:1.55;white-space:normal;}
.tooltip::after{content:'';position:absolute;top:100%;right:10px;border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid rgba(192,132,252,.4);}
.rep-badge.open .tooltip{display:block;}

/* SUBMIT */
.submit-row{margin-top:22px;padding-top:18px;border-top:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.submit-info{font-family:'Cormorant Garamond',serif;font-size:14px;color:#888;font-style:italic;}
.btn-submit{background:var(--gold);color:var(--black);border:none;padding:12px 24px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;cursor:pointer;font-weight:700;transition:all .2s;}
.btn-submit:disabled{background:#ccc;cursor:not-allowed;}
.btn-submit:not(:disabled):hover{background:var(--gold-l);}

/* LEADERBOARD */
.lb-body{background:var(--charcoal);padding:26px 36px 38px;}
.lb-title{font-family:'Cinzel',serif;color:var(--gold-l);font-size:12px;letter-spacing:4px;text-align:center;margin-bottom:4px;}
.lb-sub{text-align:center;font-family:'Cormorant Garamond',serif;color:rgba(201,168,76,.5);font-size:13px;font-style:italic;margin-bottom:22px;}
.lb-empty{text-align:center;font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.3);font-size:14px;font-style:italic;padding:20px 0;}
.lb-grid{display:grid;gap:9px;}
.lb-row{display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.035);border:1px solid rgba(201,168,76,.1);padding:12px 16px;transition:all .3s;}
.lb-row.me{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.4);}
.lb-rank{font-family:'Cinzel',serif;color:var(--gold);font-size:14px;font-weight:700;width:32px;text-align:center;flex-shrink:0;}
.lb-rank.top{font-size:20px;}
.lb-info{flex:1;min-width:0;}
.lb-name-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.lb-name{font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.88);font-size:16px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-name.me{color:var(--gold-l);}
.lb-handle{font-family:'Cinzel',serif;color:rgba(201,168,76,.5);font-size:9px;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-you{font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;color:var(--gold);border:1px solid rgba(201,168,76,.4);padding:2px 4px;flex-shrink:0;}
.lb-track{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.lb-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-l));border-radius:2px;transition:width .8s ease;}
.lb-score{text-align:right;flex-shrink:0;}
.lb-pts{font-family:'Cinzel',serif;color:var(--gold);font-size:22px;font-weight:700;line-height:1;}
.lb-correct{font-family:'Cormorant Garamond',serif;color:rgba(255,255,255,.32);font-size:11px;font-style:italic;margin-top:1px;}
.winners-section{margin-top:24px;border-top:1px solid rgba(201,168,76,.15);padding-top:20px;}
.winners-lbl{font-family:'Cinzel',serif;color:var(--gold);font-size:8px;letter-spacing:3px;margin-bottom:10px;opacity:.6;}
.winners-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px 14px;}
.winner-row{display:flex;gap:7px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.winner-cat{font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;color:rgba(201,168,76,.4);flex:0 0 auto;padding-top:3px;max-width:105px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;}
.winner-name{font-family:'Cormorant Garamond',serif;font-size:13px;color:rgba(255,255,255,.7);font-style:italic;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* FOOTER */
.footer{background:var(--black);padding:13px 40px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(201,168,76,.2);flex-wrap:wrap;gap:8px;}
.foot-logo{font-family:'Cinzel',serif;color:var(--gold);font-size:9px;letter-spacing:4px;opacity:.5;cursor:default;}
.foot-osw{font-family:'Cormorant Garamond',serif;color:rgba(192,132,252,.4);font-size:12px;font-style:italic;}
.foot-osw b{font-style:normal;color:rgba(192,132,252,.6);}
.foot-date{font-family:'Cormorant Garamond',serif;color:rgba(201,168,76,.3);font-size:11px;font-style:italic;}
.playing-as{font-family:'Cormorant Garamond',serif;color:rgba(201,168,76,.6);font-size:13px;font-style:italic;}
.playing-as b{font-style:normal;color:var(--gold-l);}

/* ADMIN */
.admin-body{background:var(--charcoal);padding:26px 36px 40px;}
.admin-h{font-family:'Cinzel',serif;color:var(--gold);font-size:11px;letter-spacing:3px;margin-bottom:20px;}
.admin-cat{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.1);padding:10px 14px;margin-bottom:8px;}
.admin-cat-lbl{font-family:'Cinzel',serif;font-size:7px;letter-spacing:2px;color:rgba(201,168,76,.45);text-transform:uppercase;margin-bottom:6px;}
.admin-row{display:flex;gap:8px;align-items:center;}
.admin-sel{flex:1;background:#0d0d0d;color:rgba(255,255,255,.8);border:1px solid rgba(201,168,76,.2);font-family:'Cormorant Garamond',serif;font-size:14px;padding:6px 8px;outline:none;font-style:italic;}
.btn-admin-save{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);padding:7px 12px;cursor:pointer;white-space:nowrap;transition:background .2s;}
.btn-admin-save:hover{background:rgba(201,168,76,.25);}
.btn-admin-save.saved{color:#6fcf6f;border-color:#2a5c2a;background:rgba(40,120,40,.15);}
.admin-won{font-family:'Cinzel',serif;font-size:8px;color:var(--gold);padding-left:4px;white-space:nowrap;}
.admin-lock-note{font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(255,255,255,.3);font-size:13px;text-align:center;padding:20px 0;}
.skel{height:40px;background:linear-gradient(90deg,#1a1a1a 25%,#242424 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;margin-bottom:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:620px){
  .bp-grid{grid-template-columns:repeat(2,1fr);}
  .grid2{grid-template-columns:1fr;}
  .cat-block{border-right:none!important;}
  .hdr,.osw-strip,.ballot-body,.lb-body,.footer,.prog-bar,.fetch-bar,.landing,.entry-body,.admin-body{padding-left:18px;padding-right:18px;}
  .winners-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONFIG ──
const LOCK_TIME = new Date("2026-03-16T00:00:00Z"); // 4pm PT / 7pm ET March 15
const TOTAL_CATS = 24;

// ── NOMINEE DATA (98th Academy Awards) ──
const CATS = [
  {id:"animated-short",title:"Animated Short Film",noms:[
    {n:"Butterfly",rep:"Directed by a Black woman — reflecting the expanded Academy membership driven by #OscarsSoWhite.",badges:["black","women"]},
    {n:"Forevergreen"},
    {n:"The Girl Who Cried Pearls",rep:"Features a non-Western cultural narrative with a female lead.",badges:["asian","women"]},
    {n:"Retirement Plan"},
    {n:"The Three Sisters"}

let S = {
  page:"entry",
  name:"",handle:"",platform:"Twitter/X",
  myName:"",myHandle:"",myPlatform:"",
  myBallotId:null,
  picks:{},submitted:false,
  winners:{},ballots:[],
  fetching:false,fetchMsg:"",
  saving:false,err:"",
  activeTip:null,
  adminAuth:false,adminPw:"",adminTabVisible:false,
  lbLoading:false,
};

const slug = s => s.toLowerCase().replace(/[^a-z0-9]/g,"_");
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── CLOCK ──
setInterval(()=>render(),1000);

// ── LOCALSTORAGE ──
function restoreLocal(){
  S.name = localStorage.getItem("osw26_name")||"";
  S.handle = localStorage.getItem("osw26_handle")||"";
  S.platform = localStorage.getItem("osw26_platform")||"Twitter/X";
  S.myBallotId = localStorage.getItem("osw26_bid")||null;
  try{const p=localStorage.getItem("osw26_picks");if(p)S.picks=JSON.parse(p);}catch(e){}
  if(S.name&&S.handle){
    S.myName=S.name;S.myHandle=S.handle;S.myPlatform=S.platform;
    S.submitted=!!S.myBallotId;
    if(S.submitted||Object.keys(S.picks).length>0){
      S.page=isLocked()?"leaderboard":"ballot";
    }
  }
  if(location.hash==="#admin")S.adminTabVisible=true;
}
function saveLocal(){
  if(S.myName)localStorage.setItem("osw26_name",S.myName);
  if(S.myHandle)localStorage.setItem("osw26_handle",S.myHandle);
  if(S.myPlatform)localStorage.setItem("osw26_platform",S.myPlatform);
  localStorage.setItem("osw26_picks",JSON.stringify(S.picks));
}

// ── API ──
async function apiFetch(path,opts={}){
  const r=await fetch(path,opts);
  if(!r.ok){const b=await r.json().catch(()=>({}));throw new Error(b.error||r.statusText);}
  return r.json();
}

async function loadShared(){
  try{
    const data=await apiFetch("/api/leaderboard");
    // Deduplicate ballots by name+handle — keep latest submission
    const dedupMap={};
    (data.ballots||[]).forEach(b=>{
      const key=(b.name+"|"+b.handle).toLowerCase();
      if(!dedupMap[key]||b.submittedAt>dedupMap[key].submittedAt)dedupMap[key]=b;
    });
    S.ballots=Object.values(dedupMap);
    // Build winners map: categoryId -> winner display name
    S.winners={};
    (data.winners||[]).forEach(w=>{S.winners[w.categoryId]=w.winnerName||w.nomineeId;});
  }catch(e){console.error("loadShared:",e);}
}

async function saveBallot(){
  S.saving=true;render();
  try{
    const res=await apiFetch("/api/ballot",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:S.myName,handle:S.myHandle,platform:S.myPlatform,picks:S.picks})
    });
    S.myBallotId=res.id;
    localStorage.setItem("osw26_bid",res.id);
    await loadShared();
    S.submitted=true;S.page="leaderboard";
  }catch(e){alert("Save failed — "+e.message);}
  S.saving=false;render();
}

async function refreshResults(){
  S.fetching=true;S.fetchMsg="Refreshing live results…";render();
  try{
    await loadShared();
    const count=Object.keys(S.winners).length;
    S.fetchMsg=count>0?`${count} winner${count!==1?"s":""} loaded ✓`:"No winners yet — try again soon.";
  }catch(e){S.fetchMsg="Error — try again.";}
  S.fetching=false;render();
  setTimeout(()=>{S.fetchMsg="";render();},5000);
}

// Admin
async function adminLogin(){
  const pw=(document.getElementById("admin-pw")||{}).value||"";
  if(!pw)return;
  S.adminPw=pw;S.adminAuth=true;render();
}
async function saveWinner(catId){
  const sel=document.getElementById("adm-"+catId);
  if(!sel||!sel.value)return;
  const winnerName=sel.value;
  const btn=document.getElementById("adm-btn-"+catId);
  if(btn){btn.textContent="…";btn.disabled=true;}
  try{
    await apiFetch("/api/winner",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({categoryId:catId,nomineeId:slug(winnerName),winnerName,password:S.adminPw})
    });
    S.winners[catId]=winnerName;
    if(btn){btn.textContent="Saved";btn.classList.add("saved");setTimeout(()=>{btn.textContent="Save";btn.classList.remove("saved");btn.disabled=false;},2000);}
  }catch(e){
    if(e.message==="Incorrect password"){S.adminAuth=false;render();}
    else{alert("Error: "+e.message);if(btn){btn.textContent="Save";btn.disabled=false;}}
  }
}

// ── POLL (every 30s after lock) ──
setInterval(async()=>{
  if(new Date()<LOCK_TIME)return;
  await loadShared();render();
},30000);

// ── HELPERS ──
function isLocked(){return new Date()>=LOCK_TIME;}
function cd(){
  const ms=LOCK_TIME-new Date();if(ms<=0)return null;
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return h>0?`${h}h ${m}m ${s}s`:m>0?`${m}m ${s}s`:`${s}s`;
}
function nomState(catId,nomName){
  const w=S.winners[catId],sel=S.picks[catId]===nomName,isWin=w===nomName;
  if(!w)return sel?"selected":"none";
  if(sel&&isWin)return"correct";if(sel)return"wrong";if(isWin)return"winner";return"none";
}
function scoreFor(picks){
  let pts=0,correct=0;
  CATS.forEach(c=>{if(S.winners[c.id]&&picks[c.id]===S.winners[c.id]){pts++;correct++;}});
  return{pts,correct};
}
function ranked(){return[...S.ballots].map(b=>({...b,...scoreFor(b.picks||{})})).sort((a,b)=>b.pts-a.pts||a.submittedAt.localeCompare(b.submittedAt));}

        </div>
        ${S.err?`<div class="err">${esc(S.err)}</div>`:""}
        <button class="btn-gold" id="btn-enter">${locked?"VIEW LEADERBOARD →":"ENTER & CAST MY BALLOT →"}</button>
        ${S.ballots.length>0?`<div class="ballot-ct">${S.ballots.length} ballot${S.ballots.length!==1?"s":""} submitted so far</div>`:""}
      </div>
    </div>
  </div>`;
}

// ── MAIN APP ──
function renderMain(){
  const locked=isLocked(),countdown=cd();
  const pickCount=Object.keys(S.picks).length;
  const ann=Object.keys(S.winners).length;
  const rnk=ranked();
  const tabs=["ballot","leaderboard",...(S.adminTabVisible?["admin"]:[])];
  return`<div class="page">
    ${renderHeader(true)}
    <div class="tabs">
      <button class="tab${S.page==="ballot"?" active":""}" data-tab="ballot">My Ballot</button>
      <button class="tab${S.page==="leaderboard"?" active":""}" data-tab="leaderboard">Leaderboard${S.ballots.length>0?` (${S.ballots.length})`:""}</button>
      ${S.adminTabVisible?`<button class="tab${S.page==="admin"?" active":""}" data-tab="admin">Admin</button>`:""}
    </div>
    ${locked?`<div class="fetch-bar">
      <span class="locked-lbl" style="font-family:'Cinzel',serif;color:#ff7070;font-size:9px;letter-spacing:2px;">🔒 PICKS LOCKED · CEREMONY LIVE</span>
      <div style="display:flex;align-items:center;gap:10px;">
        ${S.fetchMsg?`<span class="fetch-msg">${esc(S.fetchMsg)}</span>`:""}
        <button class="btn-fetch" id="btn-fetch"${S.fetching?" disabled":""}>${S.fetching?"⟳ Refreshing…":"✦ Refresh Results"}</button>
      </div>
    </div>`:`<div class="prog-bar">
      <span class="prog-lbl">PICKS MADE</span>
      <div class="prog-track"><div class="prog-fill" style="width:${pickCount/TOTAL_CATS*100}%"></div></div>
      <span class="prog-num"><b>${pickCount}</b>/${TOTAL_CATS}</span>
      ${countdown?`<span class="prog-cd">LOCKS IN ${countdown}</span>`:""}
    </div>`}
    ${S.page==="ballot"?renderBallot(locked,pickCount):S.page==="admin"?renderAdmin():renderLeaderboard(rnk,ann)}
    <div class="footer">
      <span class="foot-logo" id="foot-logo">OSCARS®</span>
      <span class="foot-osw">In honor of <b>April Reign</b> &amp; <b>#OscarsSoWhite</b> · 2015–2026</span>
      <span class="foot-date">Live March 15 · 7e | 4p · ABC &amp; Hulu</span>
    </div>
  </div>`;
}

// ── BALLOT ──
function renderBallot(locked,pickCount){
  const bpCat=CATS.find(c=>c.id==="best-picture");
  const otherCats=CATS.filter(c=>c.id!=="best-picture");
  const bpCards=bpCat.noms.map(n=>{
    const st=nomState("best-picture",n.n);
    const bc=st==="correct"?"var(--correct)":st==="wrong"?"var(--wrong)":n.rep?"var(--oswl)":"rgba(201,168,76,.3)";
    const tid=`bp-${slug(n.n)}`;
    return`<div class="bp-card${n.rep?" rep":""} ${st}" data-cat="best-picture" data-val="${esc(n.n)}" style="border-color:${bc}">
      <div class="bp-radio" style="${n.rep?"border-color:var(--oswl)":""}"><div class="bp-dot"></div></div>
      <div class="bp-title">${esc(n.n)}</div>
      ${n.rep?`<div class="bp-rep-dot" data-tipid="${tid}" data-tip="${esc(n.rep)}"></div>`:""}
    </div>`;
  }).join("");
  const otherHTML=otherCats.map((cat,i)=>{
    const w=S.winners[cat.id];
    const done=!!S.picks[cat.id];
    const noms=cat.noms.map(n=>{
      const st=nomState(cat.id,n.n);
      const icon=st==="correct"?"✓":st==="wrong"?"✗":st==="winner"?"★":"";
      const tid=`${cat.id}-${slug(n.n)}`;
      return`<li class="nom-item${n.rep?" rep":""} ${st}" data-cat="${cat.id}" data-val="${esc(n.n)}">
        <div class="radio"><div class="rdot"></div></div>
        <div class="nom-name">${esc(n.n)}${n.f?`<span class="nom-film"> — ${esc(n.f)}</span>`:""}</div>
        ${n.rep?`<span class="rep-badge${S.activeTip===tid?" open":""}" data-tipid="${tid}" data-tip="${esc(n.rep)}">◈<span class="tooltip">${esc(n.rep)}</span></span>`:""}
        ${w?`<span class="result-icon">${icon}</span>`:""}
      </li>`;
    }).join("");
    return`<div class="cat-block${i%2===1?" no-right":""}">
      <div class="cat-title${done?" done":""}">${esc(cat.title)}</div>
      <ul class="nom-list">${noms}</ul>
    </div>`;
  }).join("");
  return`<div class="ballot-body">
    ${S.submitted?`<div class="success-box">✓ Ballot locked in, ${esc(S.myName)}! Switch to the Leaderboard tab to watch scores update live.</div>`:""}
    <div class="bp-section">
      <div class="cat-title${S.picks["best-picture"]?" done":""}">Best Picture</div>
      <div class="bp-grid">${bpCards}</div>
    </div>
    <div class="divider"></div>
    <div class="grid2">${otherHTML}</div>
    ${!S.submitted&&!locked?`<div class="submit-row">
      <div class="submit-info">${pickCount===TOTAL_CATS?`All ${TOTAL_CATS} picks made — ready!`:`${TOTAL_CATS-pickCount} categories remaining`}</div>
      <button class="btn-submit" id="btn-submit"${!pickCount||S.saving?" disabled":""}>${S.saving?"Saving…":`🔒  LOCK IN MY ${pickCount} PICK${pickCount!==1?"S":""}`}</button>
    </div>`:""}
  </div>`;
}

// ── LEADERBOARD ──
function renderLeaderboard(rnk,ann){
  const rows=rnk.length===0?`<div class="lb-empty">No ballots submitted yet.</div>`:rnk.map((e,i)=>{
    const isMe=e.id===S.myBallotId||(e.name===S.myName&&e.handle===S.myHandle);
    const medal=i===0?"🏆":i===1?"🥈":i===2?"🥉":(i+1);
    const pct=ann>0?(e.pts/ann)*100:0;
    return`<div class="lb-row${isMe?" me":""}">
      <div class="lb-rank${i<3?" top":""}">${medal}</div>
      <div class="lb-info">
        <div class="lb-name-row">
          <span class="lb-name${isMe?" me":""}">${esc(e.name)}</span>
          ${isMe?`<span class="lb-you">YOU</span>`:""}
        </div>
        ${e.handle?`<div class="lb-handle">${esc(e.platform||"")}: ${esc(e.handle)}</div>`:""}
        <div class="lb-track"><div class="lb-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="lb-score">
        <div class="lb-pts">${e.pts}</div>
        <div class="lb-correct">${e.correct}/${ann}</div>
      </div>
    </div>`;
  }).join("");
  const winnerRows=CATS.filter(c=>S.winners[c.id]).map(c=>`<div class="winner-row">
    <span class="winner-cat">${esc(c.title)}</span>
    <span class="winner-name">${esc(S.winners[c.id])}</span>
  </div>`).join("");
  return`<div class="lb-body">
    <div class="lb-title">✦ &nbsp;LEADERBOARD&nbsp; ✦</div>
    <div class="lb-sub">${ann>0?`${ann}/${TOTAL_CATS} categories announced · auto-refreshes every 30s`:"Waiting for the ceremony to begin…"}</div>
    <div class="lb-grid">${rows}</div>
    ${ann>0?`<div class="winners-section"><div class="winners-lbl">ANNOUNCED WINNERS</div><div class="winners-grid">${winnerRows}</div></div>`:""}
  </div>`;
}

// ── ADMIN ──
function renderAdmin(){
  if(!S.adminAuth){
    return`<div class="admin-body">
      <div class="admin-h">ADMIN — ENTER WINNERS</div>
      <div style="max-width:380px;">
        <div class="f-lbl" style="color:rgba(201,168,76,.6)">Password</div>
        <input id="admin-pw" type="password" class="f-inp" style="background:rgba(255,255,255,.05);color:white;border-color:rgba(201,168,76,.3);" placeholder="Admin password">
        <div id="admin-err" style="color:#e88;font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;margin-bottom:10px;display:none;"></div>
        <button class="btn-gold" style="max-width:200px;" onclick="adminLogin()">UNLOCK</button>
      </div>
    </div>`;
  }
  return`<div class="admin-body">
    <div class="admin-h">ADMIN — ENTER WINNERS</div>
    ${CATS.map(cat=>`
      <div class="admin-cat">
        <div class="admin-cat-lbl">${esc(cat.title)}</div>
        <div class="admin-row">
          <select id="adm-${cat.id}" class="admin-sel">
            <option value="">— Not yet announced —</option>
            ${cat.noms.map(n=>`<option value="${esc(n.n)}"${S.winners[cat.id]===n.n?" selected":""}>${esc(n.n)}${n.f?" — "+esc(n.f):""}</option>`).join("")}
          </select>
          <button id="adm-btn-${cat.id}" class="btn-admin-save" onclick="saveWinner('${cat.id}')">Save</button>
          ${S.winners[cat.id]?`<span class="admin-won">★ ${esc(S.winners[cat.id])}</span>`:""}
        </div>
      </div>
    `).join("")}
  </div>`;
}

// ── RENDER ──
function render(){
  document.getElementById("app").innerHTML=S.page==="entry"?renderEntry():renderMain();
  bindEvents();
}

// ── EVENTS ──
let footClicks=0,footTimer=null;
function bindEvents(){
  const btnEnter=document.getElementById("btn-enter");
  if(btnEnter)btnEnter.addEventListener("click",handleEntry);
  ["inp-name","inp-handle","inp-platform"].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener("input",e=>{
      if(id==="inp-name")S.name=e.target.value;
      if(id==="inp-handle")S.handle=e.target.value;
      if(id==="inp-platform")S.platform=e.target.value;
    });
    if(id!=="inp-platform")el.addEventListener("keydown",e=>{if(e.key==="Enter")handleEntry();});
  });
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{S.page=t.dataset.tab;render();}));
  const btnFetch=document.getElementById("btn-fetch");
  if(btnFetch)btnFetch.addEventListener("click",refreshResults);
  const btnSub=document.getElementById("btn-submit");
  if(btnSub)btnSub.addEventListener("click",saveBallot);
  document.querySelectorAll(".nom-item[data-cat]").forEach(el=>{
    el.addEventListener("click",e=>{
      if(S.submitted||isLocked())return;
      if(e.target.closest(".rep-badge"))return;
      const cat=el.dataset.cat,val=el.dataset.val;
      if(S.picks[cat]===val)delete S.picks[cat];else S.picks[cat]=val;
      S.activeTip=null;saveLocal();render();
    });
  });
  document.querySelectorAll(".bp-card[data-cat]").forEach(el=>{
    el.addEventListener("click",e=>{
      if(S.submitted||isLocked())return;
      if(e.target.closest(".bp-rep-dot"))return;
      const cat=el.dataset.cat,val=el.dataset.val;
      if(S.picks[cat]===val)delete S.picks[cat];else S.picks[cat]=val;
      S.activeTip=null;saveLocal();render();
    });
  });
  document.querySelectorAll(".rep-badge,.bp-rep-dot").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const id=el.dataset.tipid;
      S.activeTip=S.activeTip===id?null:id;
      render();
    });
  });
  // Footer logo: click 5x to reveal admin tab
  const footLogo=document.getElementById("foot-logo");
  if(footLogo)footLogo.addEventListener("click",()=>{
    footClicks++;
    clearTimeout(footTimer);
    footTimer=setTimeout(()=>{footClicks=0;},2000);
    if(footClicks>=5){S.adminTabVisible=true;S.page="admin";footClicks=0;render();}
  });
  // Admin pw enter key
  const adminPw=document.getElementById("admin-pw");
  if(adminPw)adminPw.addEventListener("keydown",e=>{if(e.key==="Enter")adminLogin();});
}

function handleEntry(){
  S.name=(document.getElementById("inp-name")||{}).value||S.name;
  S.handle=(document.getElementById("inp-handle")||{}).value||S.handle;
  S.platform=(document.getElementById("inp-platform")||{}).value||S.platform;
  if(!S.name.trim()){S.err="Please enter your name.";render();return;}
  if(!S.handle.trim()){S.err="Please enter your social handle.";render();return;}
  S.err="";S.myName=S.name.trim();S.myHandle=S.handle.trim();S.myPlatform=S.platform;
  saveLocal();
  S.page=isLocked()?"leaderboard":"ballot";
  render();
}

// ── INIT ──
restoreLocal();
loadShared().then(()=>render());
// Also handle #admin hash
window.addEventListener("hashchange",()=>{
  if(location.hash==="#admin"){S.adminTabVisible=true;S.page="admin";render();}
});
</script>
</body>
